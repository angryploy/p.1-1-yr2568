<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ตรวจสอบผลการเรียน ป.1/1  ปีการศึกษา 2568</title>

<style>
body {
  font-family: "Prompt", sans-serif;
  background: linear-gradient(to bottom, #eef2ff, #ffffff);
  margin: 0;
  padding: 20px;
  text-align: center;
}

.card {
  background: white;
  max-width: 420px;
  margin: auto;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

h2 {
  margin-bottom: 10px;
}

input {
  width: 90%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 12px;
  border: 1px solid #ccc;
  font-size: 16px;
}

button {
  width: 95%;
  padding: 14px;
  margin-top: 12px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  font-weight: bold;
}

.search-btn {
  background: #4f46e5;
  color: white;
}

.choice-btn {
  background: #22c55e;
  color: white;
}

.choice-btn.alt {
  background: #f59e0b;
}

img {
  margin-top: 15px;
  width: 100%;
  border-radius: 12px;
}

.hidden {
  display: none;
}

.error {
  color: red;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="card">
  <h2>📊 ตรวจสอบผลการเรียน</h2>
  <p>สำหรับผู้ปกครอง</p>

  <input type="text" id="name" placeholder="พิมพ์ชื่อ-นามสกุลนักเรียน (เช่น กรวิชญ์ ใจดี)">
  <button class="search-btn" onclick="search()">ค้นหา</button>

  <div id="passwordBox" class="hidden">
    <input type="password" id="password" placeholder="กรอกวันเกิดของนักเรียน (เช่น 01012555)">
    <button class="search-btn" onclick="checkPassword()">ยืนยัน</button>
  </div>

  <div id="choiceBox" class="hidden">
    <button class="choice-btn" onclick="showGrade('51')">📄 เกรดนักเรียน</button>
    <button class="choice-btn alt" onclick="showGrade('68')">⭐ ระดับคุณภาพของนักเรียน</button>
  </div>

  <p id="message" class="error"></p>

  <img id="gradeImg" class="hidden">

</div>

<script>
let currentStudent = null;

const students = [
  { name: "ณัฐชนนท์ โฉมฉาย", id: "1", password: "27022561" },
  { name: "ชวกร จัทร์ทรง", id: "2", password: "21012562" },
  { name: "ดนุชัย ถันชนนาง", id: "3", password: "15092551" },
  { name: "ไน เวท", id: "4", password: "18072561" },
  { name: "กมลภพ นรดี", id: "5", password: "29042562" },
  { name: "จิรโชติ ชำนาญ", id: "6", password: "09062561" },
  { name: "วสุพล วงษ์สว่าง", id: "7", password: "01102561" },
  { name: "ฌายิน บุญบำรุง", id: "8", password: "28102561" },
  { name: "ธนภัทร ชดช้อย", id: "9", password: "24052561" },
  { name: "สิร์ปพัศ โอวาท", id: "10", password: "03012562" },
  { name: "ทวีโชค สมบุญ", id: "11", password: "27052561" },
  { name: "เม็งเลียง สลึง", id: "12", password: "22082561" },
  { name: "ชานนา คี", id: "13", password: "22112560" },
  { name: "ปัณณวัฒน์ ช่างสันเทียะ", id: "14", password: "03042562" },
  { name: "นฤเบศ แก้ววิชิต", id: "15", password: "17042562" },
  { name: "กฤติเดช สมสุข", id: "16", password: "28092561" },
  { name: "กฤตานนท์ แจ้งท้วม", id: "17", password: "18052561" },
  { name: "อภิชาติ คุ้มชุ่ม", id: "18", password: "18032562" },
  { name: "อัครพนธ์ จันทศรี", id: "19", password: "28122558" },
  { name: "นิวฟ้าใหม่ อุปชา", id: "20", password: "29012562" },
  { name: "ลลิตา แสงเจริญ", id: "21", password: "04022562" },
  { name: "นวพร ปิ่นเงิน", id: "22", password: "07012562" },
  { name: "วรันธร สุนทรานนท์", id: "23", password: "04072561" },
  { name: "ปณตพร ศรีทองคง", id: "24", password: "24072561" },
  { name: "ธันยพร ทิมเมือง", id: "25", password: "29012561" },
  { name: "สุธิดารัตน์ ม่วงงาม", id: "26", password: "08032562" },
  { name: "ณัฐธนิสชา มะนาวนอก", id: "27", password: "09052562" },
  { name: "สายฝน ศรีวิธรรม", id: "28", password: "07102561" },
  { name: "อร", id: "29", password: "25022561" },
  { name: "ธัญชนก รักธรรม", id: "30", password: "09062560" },
  { name: "ณัฐณิชา พิมพะนาม", id: "31", password: "06052561" },
  { name: "วรัญญา วิเศษบุตร", id: "32", password: "07032562" },
  { name: "ปทิตตา ศรีที", id: "33", password: "23112561" },
  { name: "รัตน์ติกาล ดีมั่น", id: "34", password: "04032562" },
  { name: "น้ำฝน", id: "35", password: "29092560" },
  { name: "ซีมอน", id: "36", password: "22052559" },
  { name: "เสาวลักษณ์ มอน", id: "37", password: "03122559" },
  { name: "ปรีชญา รัตนชัย", id: "38", password: "24122561" }
];

function search() {
  const input = document.getElementById("name").value.trim();
  const msg = document.getElementById("message");

  const found = students.find(s => s.name.includes(input));

  if (found) {
    currentStudent = found;
    document.getElementById("passwordBox").classList.remove("hidden");
    document.getElementById("choiceBox").classList.add("hidden");
    document.getElementById("gradeImg").classList.add("hidden");
    msg.innerText = "กรุณาใส่วันเกิดของนักเรียน";
  } else {
    msg.innerText = "ไม่พบข้อมูล";
  }
}

function checkPassword() {
  const pass = document.getElementById("password").value;
  const msg = document.getElementById("message");

  if (pass === currentStudent.password) {
    document.getElementById("choiceBox").classList.remove("hidden");
    msg.innerText = "เลือกรายการที่ต้องการดู";
  } else {
    msg.innerText = "วันเกิดไม่ถูกต้อง";
  }
}

function showGrade(type) {
  const img = document.getElementById("gradeImg");
  img.src = "grades/" + currentStudent.id + "_" + type + ".jpg";
  img.classList.remove("hidden");
}
</script>

</body>
</html>
